<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIM PRO - Aimlabs Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-layer">
        <!-- Aimlabs Style Top Bar -->
        <div class="top-bar-container">
            <div class="trapezoid">
                <span class="label-small">KPS</span>
                <span id="kps-val">0.0</span>
            </div>
            <div class="center-timer">
                <span id="timer-val">1:00</span>
            </div>
            <div class="trapezoid">
                <span class="label-small">ACC</span>
                <span id="accuracy-val">100</span>
                <span style="font-size: 12px; margin-left: 4px; color: #94a3b8;">%</span>
            </div>
        </div>

        <!-- Crosshair -->
        <div id="crosshair">
            <div class="ch-line ch-v ch-t"></div>
            <div class="ch-line ch-v ch-b"></div>
            <div class="ch-line ch-h ch-l"></div>
            <div class="ch-line ch-h ch-r"></div>
        </div>

        <!-- Hitmarker -->
        <div id="hitmarker">
            <div class="hm-line hm-v"></div>
            <div class="hm-line hm-h"></div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu">
            <h1>AIM PRO</h1>
            <p style="color: #888; font-size: 12px; margin-bottom: 30px;">ULTIMATE TRAINING ENVIRONMENT</p>
            
            <div class="settings-row">
                <div style="display: flex; justify-content: space-between;">
                    <span>SENSITIVITY</span>
                    <span id="sens-display">1.0</span>
                </div>
                <input type="range" id="sens-slider" min="0.1" max="5.0" step="0.1" value="1.0">
            </div>

            <button class="menu-btn" id="start-gridshot">Gridshot</button>
            <button class="menu-btn" id="start-tracking" style="background: #222; border: 1px solid #444;">Tracking</button>
            
            <p style="font-size: 10px; color: #555; margin-top: 20px;">
                PRESS ESC TO UNLOCK MOUSE<br>
                WASD TO MOVE (OPTIONAL)
            </p>
        </div>

        <!-- Summary Screen -->
        <div id="summary-screen" class="hidden">
            <h1 style="color: var(--cyan); margin-bottom: 5px;">TASK COMPLETE</h1>
            <p id="summary-mode" style="color: #888; font-size: 12px; margin-bottom: 30px; text-transform: uppercase;">GRIDSHOT</p>
            
            <div class="stat-row">
                <span class="stat-label-large">SCORE</span>
                <span id="final-score" class="stat-value-large">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label-large">ACCURACY</span>
                <span id="final-accuracy" class="stat-value-large">0%</span>
            </div>
            <div class="stat-row">
                <span class="stat-label-large">TARGETS HIT</span>
                <span id="final-hits" class="stat-value-large">0</span>
            </div>

            <button class="menu-btn" id="btn-restart" style="margin-top: 30px;">PLAY AGAIN</button>
            <button class="menu-btn" id="btn-main-menu" style="background: transparent; border: 1px solid #444;">BACK TO MENU</button>
        </div>
    </div>

    <!-- Three.js Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- Main Game Script -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
